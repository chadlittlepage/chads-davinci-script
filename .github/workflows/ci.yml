name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    name: Lint + syntax check
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff lint
        run: ruff check src/

      - name: Python syntax check (parse-only)
        run: |
          python -m compileall -q src/chads_davinci
