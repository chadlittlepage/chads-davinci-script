name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-sign-notarize-release:
    name: Build, sign, notarize, and publish DMG
    runs-on: macos-14
    permissions:
      contents: write   # required to create a GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip 'setuptools<81'
          python -m pip install \
            py2app \
            dmgbuild \
            Pillow \
            rich \
            pyobjc-core \
            pyobjc-framework-Cocoa \
            pyobjc-framework-Quartz

      - name: Download bundled binaries (mediainfo + ffprobe)
        # The binaries are stored as assets on the dedicated 'build-deps-v1'
        # GitHub Release in this same repo (kept out of git history because
        # of license + 65MB size). gh CLI handles auth via the workflow token.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p bin
          gh release download build-deps-v1 \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'mediainfo' \
            --pattern 'ffprobe' \
            --dir bin \
            --clobber
          chmod +x bin/mediainfo bin/ffprobe
          file bin/mediainfo bin/ffprobe
          shasum -a 256 bin/mediainfo bin/ffprobe

      - name: Import Developer ID Application certificate
        env:
          CERT_P12_BASE64:    ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD:      ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD:  ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm /tmp/cert.p12

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Store notarytool credentials
        env:
          APPLE_ID:                     ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD:  ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials chads-davinci-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, sign, notarize, and package DMG
        env:
          NOTARY_PROFILE: chads-davinci-notary
        run: |
          chmod +x ./build_and_sign.sh
          ./build_and_sign.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DMG_PATH="dist/Chads DaVinci Script.dmg"
          if [[ ! -f "$DMG_PATH" ]]; then
            echo "ERROR: expected $DMG_PATH but it was not produced."
            ls -la dist/
            exit 1
          fi
          gh release create "$TAG" "$DMG_PATH" \
            --title "$TAG" \
            --notes "Notarized DMG for $TAG. Drag the .app to /Applications and double-click to open — no Gatekeeper warnings."
