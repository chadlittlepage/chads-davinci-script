version: 2

updates:
  # Python build dependencies declared in pyproject.toml
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"

  # GitHub Actions versions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
